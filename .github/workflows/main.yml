name: Electron Build and Release

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    branches:
      - 'main'
      - 'master'
    paths-ignore:
      - '**.md'
      - '**.yml'

env:
  NODE_VERSION: '24.15.0'
  PNPM_VERSION: '10.34.1'

jobs:
  release-windows:
    runs-on: windows-2022

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          cd electron
          pnpm install --frozen-lockfile

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd electron
          npm run publish

  release-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08

      - name: Install dependencies
        run: |
          cd electron
          pnpm install --frozen-lockfile

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd electron
          npm run publish

  release-macos:
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Setuptools for Python (macOS only)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: |
          cd electron
          pnpm install --frozen-lockfile

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd electron
          npm run publish

  release-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./capacitor

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          check-latest: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper/dists
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install node-pre-gyp
        run: pnpm install -g node-pre-gyp

      - name: Build Native + Web
        run: pnpm run build:app

      - name: Build Android APK
        run: cd android && chmod +x ./gradlew && ./gradlew assembleRelease

      - name: Stop Gradle Daemon
        run: cd android && ./gradlew --stop

      - name: Get or Create Release Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('../electron/package.json').version")
          APP_VERSION="v$VERSION"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "App Version: $APP_VERSION"
          if ! gh release view "$APP_VERSION" > /dev/null 2>&1; then
            echo "Release Tag $APP_VERSION not found, creating draft..."
            gh release create "$APP_VERSION" --draft --title "$VERSION" --notes ""
          else
            echo "Release Tag $APP_VERSION already exists, skipping creation."
          fi

      - name: Sign Android APK
        id: sign_app
        uses: RockinChaos/sign-android@v1.1.0
        with:
          releaseDir: capacitor/android/app/build/outputs/apk/release
          signingKey: "${{ secrets.SIGNING_KEY }}"
          keyAlias: "${{ secrets.ALIAS }}"
          keyStorePassword: "${{ secrets.KEY_STORE_PASSWORD }}"
          keyPassword: "${{ secrets.KEY_PASSWORD }}"
          appName: Shiru
          appVersion: ${{ env.APP_VERSION }}
          appPrefix: android

      - name: Split Signed Files
        uses: jungwinter/split@v2
        id: signed_files
        with:
          msg: ${{ steps.sign_app.outputs.signedFiles }}
          separator: ':'

      - name: Generate latest-android.yml
        run: |
          echo "version: ${APP_VERSION#v}" > latest-android.yml

      - name: Publish Android APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in "${{ steps.signed_files.outputs._0 }}" "${{ steps.signed_files.outputs._1 }}" "${{ steps.signed_files.outputs._2 }}" "${{ steps.signed_files.outputs._3 }}"; do
            if [ -n "$f" ]; then
              echo "uploading $(basename $f)"
              gh release upload --clobber "${{ env.APP_VERSION }}" "../$f"
            fi
          done
          echo "uploading latest-android.yml"
          gh release upload --clobber "${{ env.APP_VERSION }}" latest-android.yml

      - name: Clean Build Artifacts
        run: rm -rf ./build